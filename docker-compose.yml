services:
  postgres:
    image: postgres:17.5-alpine
    container_name: testify-postgres
    restart: always
    env_file:
      - ./testify-backend/.env
      - ./testify-backend/.env.development.local
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-testify_db}
      POSTGRES_PORT: 5432
    ports:
      - "3430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - testify-network

  redis:
    image: redis:7-alpine
    container_name: testify-redis
    restart: always
    ports:
      - "6380:6379"
    networks:
      - testify-network

  app:
    build:
      context: ./testify-backend
      dockerfile: ./Dockerfile
      target: builder
    container_name: testify-app
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "3431:3431"
    env_file:
      - ./testify-backend/.env
      - ./testify-backend/.env.development.local
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - DATABASE_SYNCHRONIZE=true
    command: sh -c "npm run seed:dev && npm run start:dev"
    networks:
      - testify-network

  web:
    build:
      context: ./testify-web
      dockerfile: ./Dockerfile
    container_name: testify-web
    restart: always
    depends_on:
      - app
    ports:
      - "3432:80"
    environment:
      # Inject the backend URL that the user's browser should call 
      # Since we expose the backend on 3431 on the host, we use localhost here
      - VITE_BACKEND_API_URL=http://localhost:3431/api/v1
    networks:
      - testify-network

networks:
  testify-network:
    driver: bridge

volumes:
  postgres_data:
